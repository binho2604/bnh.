<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Senha - Cine Terror</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="main-header">
        <h1 class="site-title">Cine Terror</h1>
        <p class="site-slogan">Seus Piores Pesadelos em Review</p>
        <nav class="main-nav">
            <a href="login.html" class="btn-primary">Login</a>
            <a href="cadastro.html" class="btn-secondary">Cadastre-se</a>
        </nav>
    </header>

    <main class="container">
        <div class="login-container"> 
            <h2>Recuperar Senha</h2>
            <p style="font-family: 'Merriweather Sans', sans-serif; color: #ccc; margin-bottom: 30px; font-size: 1.05em;">
                Informe seu email para enviarmos um link de recuperação de senha.
            </p>
            <form action="#" method="POST">
                <div class="input-group">
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <button type="submit" class="btn-login">Enviar Link de Recuperação</button>
            </form>
            <p class="signup-link">Lembrou da senha? <a href="login.html">Faça Login</a></p>
        </div>
    </main>

    <div class="glitch-effect"></div>

    <footer class="main-footer">
        <p>&copy; 2025 Cine Terror. Todos os direitos reservados. Design e Desenvolvimento por BNH.</p>
    </footer>

    <script src="js/glitch.js"></script>
</body>
</html>
